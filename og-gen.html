<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    position: relative;
    font-family: 'Courier New', monospace;
  }

  /* background image — the uploaded photo */
  .bg {
    position: absolute;
    inset: 0;
    background: url('Open graph.jpg') center center / cover no-repeat;
  }

  /* dark overlay to make text legible and shift tone darker */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,10,0.38);
  }

  /* vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 100%);
  }

  /* corner brackets */
  .corner {
    position: absolute;
    width: 22px;
    height: 22px;
    z-index: 20;
  }
  .corner.tl { top: 30px; left: 40px; border-top: 1px solid rgba(30,30,30,0.6); border-left: 1px solid rgba(30,30,30,0.6); }
  .corner.tr { top: 30px; right: 40px; border-top: 1px solid rgba(30,30,30,0.6); border-right: 1px solid rgba(30,30,30,0.6); }
  .corner.bl { bottom: 30px; left: 40px; border-bottom: 1px solid rgba(30,30,30,0.6); border-left: 1px solid rgba(30,30,30,0.6); }
  .corner.br { bottom: 30px; right: 40px; border-bottom: 1px solid rgba(30,30,30,0.6); border-right: 1px solid rgba(30,30,30,0.6); }

  /* bottom bar — name + title */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 88px;
    background: linear-gradient(to top, rgba(8,8,8,0.88) 60%, transparent 100%);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 50px 26px;
    z-index: 20;
  }

  .name {
    font-family: 'Courier New', monospace;
    font-size: 17px;
    letter-spacing: 0.32em;
    color: rgba(20,20,20,0.85);
    font-weight: bold;
    text-transform: uppercase;
  }

  .title {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: rgba(20,20,20,0.55);
    text-transform: uppercase;
  }

  /* domain top right */
  .domain {
    position: absolute;
    top: 34px;
    right: 50px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(20,20,20,0.4);
    text-transform: lowercase;
    z-index: 20;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="vignette"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="domain">anuraginimediga.com</div>

  <div class="bottom-bar">
    <div class="name">Anuragini Mediga</div>
    <div class="title">Creative Producer &nbsp;·&nbsp; Director &nbsp;·&nbsp; NYC</div>
  </div>
</body>
</html>
