<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORKS — Anuragini Mediga</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --text:    #d8d4bc;
      --dim:     rgba(216,212,188,0.52);
      --amber:   #c9a84c;
      --border:  rgba(201,168,76,0.13);
      --surface: rgba(255,255,255,0.05);
      --topH:    68px;
      --botH:    46px;
      --labelW:  180px;
      --clipH:   72px;
      --clipW:   210px;
      /* category accents */
      --doc:     #4a9c6f;
      --pod:     #4a7fc1;
      --brand:   #c9a84c;
      --film:    #9b6fd4;
      --photo:   #2ab8aa;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      user-select: none;
    }

    /* ── grain ── */
    .grain {
      position: fixed; inset: 0; pointer-events: none;
      z-index: 900; opacity: .055; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── flash ── */
    #flash { position: fixed; inset: 0; background: var(--bg); opacity: 0; pointer-events: none; z-index: 800; }

    /* ══════════════════════════════════
       TOOLBAR
    ══════════════════════════════════ */
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topH);
      z-index: 300;
      display: flex; align-items: center; gap: 0;
      background: rgba(8,8,8,.97);
      border-bottom: 1px solid var(--border);
    }

    /* Left section — app icon + title */
    #toolbar-left {
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px;
      border-right: 1px solid var(--border);
      height: 100%;
      flex-shrink: 0;
    }
    #page-title {
      font-family: 'VT323', monospace;
      font-size: 2.2rem;
      letter-spacing: .28em;
      color: var(--amber);
    }
    #toolbar-divider {
      width: 1px; height: 22px;
      background: var(--border);
    }

    /* Filter buttons */
    #filters {
      display: flex; align-items: center; gap: 4px;
      padding: 0 18px;
      flex: 1;
      overflow-x: auto;
    }
    #filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px;
      background: none;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 3px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .8rem;
      letter-spacing: .1em;
      color: var(--dim);
      cursor: pointer;
      transition: background .14s, border-color .14s, color .14s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-btn:hover {
      background: var(--surface);
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
    }
    .filter-btn.active {
      background: rgba(201,168,76,0.1);
      border-color: rgba(201,168,76,0.35);
      color: var(--text);
    }
    .cat-dot {
      width: 9px; height: 9px; border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-all   { background: var(--amber); }
    .dot-doc   { background: var(--doc);   }
    .dot-pod   { background: var(--pod);   }
    .dot-brand { background: var(--brand); }
    .dot-film  { background: var(--film);  }
    .dot-photo { background: var(--photo); }

    /* Right nav */
    #toolbar-nav {
      display: flex; align-items: center; gap: 0;
      border-left: 1px solid var(--border);
      height: 100%;
      flex-shrink: 0;
    }
    .nav-link {
      display: flex; align-items: center;
      height: 100%;
      padding: 0 20px;
      font-size: .78rem;
      letter-spacing: .12em;
      color: var(--dim);
      text-decoration: none;
      border-right: 1px solid var(--border);
      transition: color .14s, background .14s;
    }
    .nav-link:hover {
      color: var(--text);
      background: var(--surface);
    }

    /* ══════════════════════════════════
       TIMELINE
    ══════════════════════════════════ */
    #timeline {
      position: fixed;
      top: var(--topH);
      bottom: var(--botH);
      left: 0; right: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #timeline::-webkit-scrollbar { width: 4px; }
    #timeline::-webkit-scrollbar-track { background: transparent; }
    #timeline::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.18); border-radius: 2px; }

    /* Track */
    .track {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      min-height: calc(var(--clipH) + 24px);
    }
    .track:first-child { border-top: 1px solid rgba(255,255,255,0.05); }
    .track.hidden { display: none; }

    /* Track label column */
    .track-head {
      flex-shrink: 0;
      width: var(--labelW);
      display: flex; flex-direction: column; justify-content: center;
      padding: 10px 14px;
      border-right: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.25);
      position: sticky; left: 0;
    }
    .track-indicator {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 4px;
    }
    .track-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
    }
    .track-cat {
      font-size: .68rem;
      letter-spacing: .14em;
      color: var(--dim);
    }
    .track-name {
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      letter-spacing: .12em;
      color: var(--text);
      line-height: 1;
    }
    .track-count {
      font-size: .68rem;
      color: var(--dim);
      margin-top: 4px;
      letter-spacing: .08em;
    }

    /* Left accent bar on track */
    .track::before {
      content: '';
      flex-shrink: 0;
      width: 3px;
      align-self: stretch;
    }
    .track[data-cat="documentary"]::before { background: var(--doc); }
    .track[data-cat="podcast"]::before     { background: var(--pod); }
    .track[data-cat="brand"]::before       { background: var(--brand); }
    .track[data-cat="film"]::before        { background: var(--film); }
    .track[data-cat="photography"]::before { background: var(--photo); }

    /* Clips area */
    .track-body {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
      padding: 16px 18px;
      overflow: visible;
    }

    /* Clip block */
    .clip {
      position: relative;
      width: var(--clipW);
      height: var(--clipH);
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 0 14px;
      transition: background .15s, border-color .15s, transform .12s;
      overflow: visible;
    }
    .clip:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.16);
      transform: translateY(-1px);
      z-index: 100;
    }
    /* Colored left stripe */
    .clip::before {
      content: '';
      position: absolute;
      left: 0; top: 3px; bottom: 3px;
      width: 3px;
      border-radius: 2px 0 0 2px;
    }
    .clip[data-cat="documentary"]::before { background: var(--doc); }
    .clip[data-cat="podcast"]::before     { background: var(--pod); }
    .clip[data-cat="brand"]::before       { background: var(--brand); }
    .clip[data-cat="film"]::before        { background: var(--film); }
    .clip[data-cat="photography"]::before { background: var(--photo); }

    .clip-title {
      font-size: .82rem;
      letter-spacing: .06em;
      color: rgba(216,212,188,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-left: 10px;
      line-height: 1.3;
    }
    .clip-format {
      font-size: .62rem;
      color: var(--dim);
      letter-spacing: .05em;
      padding-left: 10px;
      margin-top: 3px;
    }
    .clip-inner {
      display: flex; flex-direction: column;
      overflow: hidden; width: 100%;
    }

    /* ── Preview card (fixed, JS-positioned) ── */
    #preview-card {
      position: fixed;
      z-index: 8000;
      min-width: 260px; max-width: 320px;
      background: rgba(10,10,10,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-top: 2px solid var(--preview-accent, var(--amber));
      border-radius: 4px;
      padding: 16px 18px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .12s;
      backdrop-filter: blur(12px);
    }
    #preview-card.visible { opacity: 1; }
    .pv-title {
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      letter-spacing: .1em;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.1;
    }
    .pv-meta {
      font-size: .7rem;
      letter-spacing: .1em;
      color: var(--dim);
      margin-bottom: 10px;
    }
    .pv-desc {
      font-size: .7rem;
      letter-spacing: .04em;
      color: rgba(216,212,188,0.65);
      line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 10px;
    }

    /* ══════════════════════════════════
       STATUS BAR
    ══════════════════════════════════ */
    #statusbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--botH);
      z-index: 300;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 22px;
      background: rgba(8,8,8,.97);
      border-top: 1px solid var(--border);
      font-size: .72rem;
      letter-spacing: .1em;
      color: var(--dim);
    }
    #statusbar-left { display: flex; align-items: center; gap: 24px; }
    #clip-count { color: var(--amber); }
    .sb-nav { display: flex; gap: 20px; }
    .sb-nav a {
      color: var(--dim);
      text-decoration: none;
      letter-spacing: .1em;
      font-size: .72rem;
      transition: color .14s;
    }
    .sb-nav a:hover { color: var(--text); }

  </style>
</head>

        { title: 'MET · NYC · 2025',           year: '2025', format: 'FINE ART · EDITORIAL', desc: 'Architectural and portrait photography inside the Metropolitan Museum of Art.' },
        { title: 'New York City',              year: '2023', format: 'STREET PHOTOGRAPHY', desc: 'An ongoing street photography series documenting life in New York City.' },
        { title: 'NY Fashion Week 2025',       year: '2025', format: 'FASHION · EDITORIAL', desc: 'Runway and backstage photography from New York Fashion Week, Spring 2025.' },
        { title: 'Hyderabad',                  year: '2022', format: 'STREET · DOCUMENTARY', desc: 'Street photography from Hyderabad, India — people, texture, light.' },
        { title: 'Portraits',                  year: '2023', format: 'PORTRAIT SERIES', desc: 'A studio and location portrait series — directional light, minimal styling.' },
        { title: 'Tirupati',                   year: '2022', format: 'DOCUMENTARY · TRAVEL', desc: 'Documentary photography from Tirupati — pilgrimage, devotion, and stillness.' },
        { title: 'Vellorex — Product',         year: '2023', format: 'PRODUCT PHOTOGRAPHY', desc: 'Commercial product photography for Vellorex — clean studio setup, styled compositions.' },
      ]
    };

    /* Category accent map */
    const ACCENTS = {
      documentary: 'var(--doc)',
      podcast:     'var(--pod)',
      brand:       'var(--brand)',
      film:        'var(--film)',
      photography: 'var(--photo)'
    };

    /* ── Build clips ──────────────────────────────────────────────────────── */
    let totalClips = 0;

    Object.entries(PROJECTS).forEach(([cat, projects]) => {
      const body  = document.getElementById('body-' + cat);
      const count = document.getElementById('count-' + cat);
      totalClips += projects.length;
      count.textContent = projects.length + ' CLIP' + (projects.length !== 1 ? 'S' : '');

      projects.forEach(p => {
        const clip = document.createElement('div');
        clip.className = 'clip';
        clip.dataset.cat   = cat;
        clip.dataset.title = p.title;
        clip.dataset.year  = p.year;
        clip.dataset.fmt   = p.format;
        clip.dataset.desc  = p.desc;
        clip.dataset.link  = p.link || '';
        clip.dataset.accent = ACCENTS[cat];

        clip.innerHTML =
          '<div class="clip-inner">' +
          '<div class="clip-title">' + p.title.toUpperCase() + '</div>' +
          '<div class="clip-format">' + p.year + ' · ' + p.format.split('·')[0].trim() + '</div>' +
          '</div>';

        if (p.link) {
          clip.addEventListener('click', () => {
            window.open(p.link, '_blank', 'noopener');
          });
        }
        body.appendChild(clip);
      });
    });

    document.getElementById('clip-count').textContent = totalClips + ' CLIPS';

    /* ── Preview card ─────────────────────────────────────────────────────── */
    const card   = document.getElementById('preview-card');
    const pvTitle = document.getElementById('pv-title');
    const pvMeta  = document.getElementById('pv-meta');
    const pvDesc  = document.getElementById('pv-desc');
    let hideTimer = null;

    document.querySelectorAll('.clip').forEach(clip => {
      clip.addEventListener('mouseenter', function (e) {
        clearTimeout(hideTimer);
        pvTitle.textContent = clip.dataset.title;
        pvMeta.textContent  = clip.dataset.year + ' · ' + clip.dataset.fmt;
        pvDesc.textContent  = clip.dataset.desc;
        card.style.setProperty('--preview-accent', clip.dataset.accent);

        positionCard(e);
        card.classList.add('visible');
      });

      clip.addEventListener('mousemove', positionCard);

      clip.addEventListener('mouseleave', () => {
        hideTimer = setTimeout(() => card.classList.remove('visible'), 80);
      });
    });

    function positionCard(e) {
      const PAD = 14;
      const CW = card.offsetWidth  || 240;
      const CH = card.offsetHeight || 120;
      let x = e.clientX + PAD;
      let y = e.clientY - CH - PAD;
      if (x + CW > window.innerWidth  - PAD) x = e.clientX - CW - PAD;
      if (y < PAD) y = e.clientY + PAD;
      card.style.left = x + 'px';
      card.style.top  = y + 'px';
    }

    /* ── Filter buttons ───────────────────────────────────────────────────── */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        document.querySelectorAll('.track').forEach(track => {
          if (f === 'all' || track.dataset.cat === f) {
            track.classList.remove('hidden');
          } else {
            track.classList.add('hidden');
          }
        });
      });
    });

  })();
  </script>

  <script src="film-transition.js"></script>
</body>
</html>
