<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORKS — Anuragini Mediga</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --text:    #d8d4bc;
      --dim:     rgba(216,212,188,0.52);
      --amber:   #c9a84c;
      --border:  rgba(201,168,76,0.13);
      --surface: rgba(255,255,255,0.05);
      --topH:    68px;
      --botH:    58px;
      --labelW:  180px;
      --clipH:   72px;
      --clipW:   210px;
      /* category accents */
      --doc:     #4a9c6f;
      --pod:     #4a7fc1;
      --brand:   #c9a84c;
      --film:    #9b6fd4;
      --photo:   #2ab8aa;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-weight: bold;
      user-select: none;
    }

    /* ── grain ── */
    .grain {
      position: fixed; inset: 0; pointer-events: none;
      z-index: 900; opacity: .055; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── flash ── */
    #flash { position: fixed; inset: 0; background: var(--bg); opacity: 0; pointer-events: none; z-index: 800; }

    /* ══════════════════════════════════
       TOOLBAR
    ══════════════════════════════════ */
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topH);
      z-index: 300;
      display: flex; align-items: center; gap: 0;
      background: rgba(8,8,8,.97);
      border-bottom: 1px solid var(--border);
    }

    /* Left section — app icon + title */
    #toolbar-left {
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px;
      border-right: 1px solid var(--border);
      height: 100%;
      flex-shrink: 0;
    }
    #page-title {
      font-family: 'VT323', monospace;
      font-size: 2.2rem;
      letter-spacing: .28em;
      color: var(--amber);
    }
    #toolbar-divider {
      width: 1px; height: 22px;
      background: var(--border);
    }

    /* Filter buttons */
    #filters {
      display: flex; align-items: center; gap: 4px;
      padding: 0 18px;
      flex: 1;
      overflow-x: auto;
    }
    #filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px;
      background: none;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 3px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .8rem;
      font-weight: bold;
      letter-spacing: .1em;
      color: var(--dim);
      cursor: pointer;
      transition: background .14s, border-color .14s, color .14s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-btn:hover {
      background: var(--surface);
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
    }
    .filter-btn.active {
      background: rgba(201,168,76,0.1);
      border-color: rgba(201,168,76,0.35);
      color: var(--text);
    }
    .cat-dot {
      width: 9px; height: 9px; border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-all   { background: var(--amber); }
    .dot-doc   { background: var(--doc);   }
    .dot-pod   { background: var(--pod);   }
    .dot-brand { background: var(--brand); }
    .dot-film  { background: var(--film);  }
    .dot-photo { background: var(--photo); }

    /* Right nav — hidden, moved to footer */
    #toolbar-nav { display: none; }

    /* ══════════════════════════════════
       TIMELINE
    ══════════════════════════════════ */
    #timeline {
      position: fixed;
      top: var(--topH);
      bottom: var(--botH);
      left: 0; right: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #timeline::-webkit-scrollbar { width: 4px; }
    #timeline::-webkit-scrollbar-track { background: transparent; }
    #timeline::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.18); border-radius: 2px; }

    /* Track */
    .track {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      min-height: calc(var(--clipH) + 24px);
    }
    .track:first-child { border-top: 1px solid rgba(255,255,255,0.05); }
    .track.hidden { display: none; }

    /* Track label column */
    .track-head {
      flex-shrink: 0;
      width: 220px;
      display: flex; flex-direction: column; justify-content: center;
      padding: 22px 22px;
      border-right: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.25);
      position: sticky; left: 0;
    }
    .track-indicator {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .track-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
    }
    .track-cat {
      font-size: .7rem;
      letter-spacing: .16em;
      color: var(--dim);
    }
    .track-name {
      font-family: 'VT323', monospace;
      font-size: 1.8rem;
      letter-spacing: .12em;
      color: var(--text);
      line-height: 1;
    }
    .track-count { display: none; }

    /* Left accent bar on track */
    .track::before {
      content: '';
      flex-shrink: 0;
      width: 3px;
      align-self: stretch;
    }
    .track[data-cat="documentary"]::before { background: var(--doc); }
    .track[data-cat="podcast"]::before     { background: var(--pod); }
    .track[data-cat="brand"]::before       { background: var(--brand); }
    .track[data-cat="film"]::before        { background: var(--film); }
    .track[data-cat="photography"]::before { background: var(--photo); }

    /* Clips area */
    .track-body {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
      padding: 16px 18px;
      overflow: visible;
    }

    /* Clip block */
    .clip {
      position: relative;
      width: var(--clipW);
      height: var(--clipH);
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 0 14px;
      transition: background .15s, border-color .15s, transform .12s;
      overflow: visible;
    }
    .clip:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.16);
      transform: translateY(-1px);
      z-index: 100;
    }
    /* Colored left stripe */
    .clip::before {
      content: '';
      position: absolute;
      left: 0; top: 3px; bottom: 3px;
      width: 3px;
      border-radius: 2px 0 0 2px;
    }
    .clip[data-cat="documentary"]::before { background: var(--doc); }
    .clip[data-cat="podcast"]::before     { background: var(--pod); }
    .clip[data-cat="brand"]::before       { background: var(--brand); }
    .clip[data-cat="film"]::before        { background: var(--film); }
    .clip[data-cat="photography"]::before { background: var(--photo); }

    .clip-title {
      font-size: .82rem;
      font-weight: bold;
      letter-spacing: .06em;
      color: rgba(216,212,188,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-left: 10px;
      line-height: 1.3;
    }
    .clip-format {
      font-size: .62rem;
      font-weight: bold;
      color: var(--dim);
      letter-spacing: .05em;
      padding-left: 10px;
      margin-top: 3px;
    }
    .clip-inner {
      display: flex; flex-direction: column;
      overflow: hidden; width: 100%;
    }

    /* ── Preview card (fixed, JS-positioned) ── */
    #preview-card {
      position: fixed;
      z-index: 8000;
      min-width: 260px; max-width: 320px;
      background: rgba(10,10,10,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-top: 2px solid var(--preview-accent, var(--amber));
      border-radius: 4px;
      overflow: hidden;
      padding: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity .12s;
      backdrop-filter: blur(12px);
    }
    #preview-card.visible { opacity: 1; }
    /* Poster thumbnail */
    #pv-poster {
      width: 100%;
      height: 170px;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.04);
    }
    #pv-poster.hidden { display: none; }
    /* Text area */
    #pv-body { padding: 14px 16px; }
    .pv-title {
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      letter-spacing: .1em;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.1;
    }
    .pv-meta {
      font-size: .7rem;
      letter-spacing: .1em;
      color: var(--dim);
      margin-bottom: 10px;
    }
    .pv-desc {
      font-size: .7rem;
      letter-spacing: .04em;
      color: rgba(216,212,188,0.65);
      line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 10px;
    }

    /* ══════════════════════════════════
       STATUS BAR
    ══════════════════════════════════ */
    #statusbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--botH);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      gap: clamp(24px, 7vw, 64px);
      background: rgba(8,8,8,.97);
      border-top: 1px solid #2a2318;
    }
    .sb-vcr-btn {
      font-family: 'VT323', monospace;
      font-size: clamp(1.4rem, 2.8vw, 2.2rem);
      letter-spacing: 0.12em;
      color: rgba(210,205,185,0.55);
      background: none; border: none; cursor: pointer;
      text-shadow: -1px 0 rgba(255,40,40,0.3), 1px 0 rgba(40,220,255,0.3);
      transition: color 0.15s, text-shadow 0.15s, transform 0.15s;
      padding: 2px 4px; user-select: none; text-decoration: none;
      display: inline-block;
    }
    .sb-vcr-btn:hover {
      color: #fff;
      text-shadow:
        -3px 0 rgba(255,40,40,0.85),
         3px 0 rgba(40,220,255,0.85),
         0 0 18px rgba(255,245,200,0.85),
         0 0 40px rgba(220,200,120,0.45);
      transform: scale(1.08);
    }
    .sb-vcr-btn:active { transform: scale(0.96); }

    /* ══════════════════════════════════
       MONITOR MODAL
    ══════════════════════════════════ */
    #monitor-modal {
      display: none;
      position: fixed; inset: 0;
      z-index: 9900;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(6px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #monitor-modal.open { display: flex; }

    /* Bezel */
    #monitor-bezel {
      position: relative;
      background: #0d0d0d;
      border: 2px solid rgba(201,168,76,0.25);
      border-radius: 6px;
      box-shadow: 0 0 0 1px rgba(0,0,0,.8), 0 32px 80px rgba(0,0,0,.8);
      display: flex; flex-direction: column;
      width: min(92vw, 1100px);       /* 16:9 default */
      max-height: 94vh;
      overflow: hidden;
      transition: width .25s ease;
    }
    /* 9:16 portrait mode (Instagram) */
    #monitor-modal.portrait #monitor-bezel {
      width: min(46vh, 420px);
    }

    /* Corner markers */
    #monitor-bezel::before, #monitor-bezel::after,
    #monitor-inner::before, #monitor-inner::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--amber);
      border-style: solid;
      z-index: 2;
    }
    #monitor-bezel::before  { top: 6px; left: 6px;  border-width: 2px 0 0 2px; }
    #monitor-bezel::after   { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
    #monitor-inner::before  { bottom: 6px; left: 6px;  border-width: 0 0 2px 2px; }
    #monitor-inner::after   { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

    /* Top bar */
    #monitor-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      flex-shrink: 0;
    }
    #monitor-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      font-weight: bold;
      letter-spacing: .2em;
      color: var(--amber);
    }
    #monitor-close {
      background: none; border: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      font-weight: bold;
      letter-spacing: .12em;
      color: var(--dim);
      cursor: pointer;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 3px;
      transition: color .12s, border-color .12s;
    }
    #monitor-close:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* Screen area */
    #monitor-inner {
      position: relative;
      flex: 1;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      min-height: 300px;
      overflow: hidden;
    }
    #monitor-inner img {
      max-width: 100%; max-height: 70vh;
      object-fit: contain;
      display: block;
    }
    #monitor-inner iframe {
      width: 100%; height: 100%;
      min-height: 480px;
      border: none;
      display: block;
    }
    #monitor-placeholder {
      font-family: 'VT323', monospace;
      font-size: 2rem;
      letter-spacing: .2em;
      color: rgba(201,168,76,0.3);
      text-align: center;
      padding: 60px;
    }

    /* Bottom info bar */
    #monitor-infobar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,.6);
      flex-shrink: 0;
    }
    #monitor-title {
      font-family: 'VT323', monospace;
      font-size: 1.6rem;
      letter-spacing: .14em;
      color: var(--text);
      line-height: 1;
    }
    #monitor-meta {
      font-size: .7rem;
      font-weight: bold;
      letter-spacing: .12em;
      color: var(--dim);
    }
    #monitor-link {
      font-size: .7rem;
      font-weight: bold;
      letter-spacing: .12em;
      color: var(--amber);
      text-decoration: none;
      border: 1px solid rgba(201,168,76,0.3);
      padding: 5px 12px;
      border-radius: 3px;
      transition: background .14s;
    }
    #monitor-link:hover { background: rgba(201,168,76,0.1); }
    #monitor-link.hidden { display: none; }

    /* Gallery nav arrows */
    .gallery-arrow {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(201,168,76,0.25);
      color: var(--amber);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 14px 10px;
      cursor: pointer;
      transition: background .13s, border-color .13s;
      line-height: 1;
      user-select: none;
    }
    .gallery-arrow:hover { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.5); }
    .gallery-arrow.hidden { display: none; }
    #gallery-prev { left: 10px; }
    #gallery-next { right: 10px; }

    /* Gallery counter */
    #gallery-counter {
      position: absolute;
      top: 10px; right: 14px;
      z-index: 10;
      font-family: 'Share Tech Mono', monospace;
      font-size: .68rem;
      font-weight: bold;
      letter-spacing: .14em;
      color: rgba(201,168,76,0.7);
      background: rgba(0,0,0,0.55);
      padding: 3px 8px;
      border-radius: 2px;
    }
    #gallery-counter.hidden { display: none; }

    /* Scanline overlay inside monitor */
    #monitor-scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 4;
    }

  </style>
</head>
<body>

  <div class="grain"></div>
  <div id="flash"></div>

  <!-- ── TOOLBAR ── -->
  <div id="toolbar">
    <div id="toolbar-left">
      <span id="page-title">WORKS</span>
    </div>

    <div id="filters">
      <button class="filter-btn active" data-filter="all">
        <span class="cat-dot dot-all"></span>ALL
      </button>
      <button class="filter-btn" data-filter="documentary">
        <span class="cat-dot dot-doc"></span>DOCUMENTARY
      </button>
      <button class="filter-btn" data-filter="podcast">
        <span class="cat-dot dot-pod"></span>PODCAST
      </button>
      <button class="filter-btn" data-filter="brand">
        <span class="cat-dot dot-brand"></span>BRANDS / ADS
      </button>
      <button class="filter-btn" data-filter="film">
        <span class="cat-dot dot-film"></span>FILM
      </button>
      <button class="filter-btn" data-filter="photography">
        <span class="cat-dot dot-photo"></span>PHOTOGRAPHY
      </button>
    </div>

    <nav id="toolbar-nav"></nav>
  </div>

  <!-- ── TIMELINE ── -->
  <div id="timeline">

    <!-- DOCUMENTARY -->
    <div class="track" data-cat="documentary">
      <div class="track-head">
        <div class="track-indicator">
          <div class="track-dot" style="background:var(--doc)"></div>
          <span class="track-cat">TRACK 01</span>
        </div>
        <div class="track-name">DOCUMENTARY</div>
        <div class="track-count" id="count-documentary"></div>
      </div>
      <div class="track-body" id="body-documentary"></div>
    </div>

    <!-- PODCAST -->
    <div class="track" data-cat="podcast">
      <div class="track-head">
        <div class="track-indicator">
          <div class="track-dot" style="background:var(--pod)"></div>
          <span class="track-cat">TRACK 02</span>
        </div>
        <div class="track-name">PODCAST</div>
        <div class="track-count" id="count-podcast"></div>
      </div>
      <div class="track-body" id="body-podcast"></div>
    </div>

    <!-- BRAND FILM -->
    <div class="track" data-cat="brand">
      <div class="track-head">
        <div class="track-indicator">
          <div class="track-dot" style="background:var(--brand)"></div>
          <span class="track-cat">TRACK 03</span>
        </div>
        <div class="track-name">BRANDS / ADS</div>
        <div class="track-count" id="count-brand"></div>
      </div>
      <div class="track-body" id="body-brand"></div>
    </div>

    <!-- FILM -->
    <div class="track" data-cat="film">
      <div class="track-head">
        <div class="track-indicator">
          <div class="track-dot" style="background:var(--film)"></div>
          <span class="track-cat">TRACK 04</span>
        </div>
        <div class="track-name">FILM</div>
        <div class="track-count" id="count-film"></div>
      </div>
      <div class="track-body" id="body-film"></div>
    </div>

    <!-- PHOTOGRAPHY -->
    <div class="track" data-cat="photography">
      <div class="track-head">
        <div class="track-indicator">
          <div class="track-dot" style="background:var(--photo)"></div>
          <span class="track-cat">TRACK 05</span>
        </div>
        <div class="track-name">PHOTOGRAPHY</div>
        <div class="track-count" id="count-photography"></div>
      </div>
      <div class="track-body" id="body-photography"></div>
    </div>

  </div>

  <!-- ── PREVIEW CARD ── -->
  <div id="preview-card">
    <img id="pv-poster" class="hidden" src="" alt="">
    <div id="pv-body">
      <div class="pv-title" id="pv-title"></div>
      <div class="pv-meta"  id="pv-meta"></div>
      <div class="pv-desc"  id="pv-desc"></div>
    </div>
  </div>

  <!-- ── MONITOR MODAL ── -->
  <div id="monitor-modal">
    <div id="monitor-bezel">
      <div id="monitor-topbar">
        <span id="monitor-label">◆ PREVIEW MONITOR</span>
        <button id="monitor-close">✕ CLOSE  [ESC]</button>
      </div>
      <div id="monitor-inner">
        <button class="gallery-arrow hidden" id="gallery-prev">◀</button>
        <button class="gallery-arrow hidden" id="gallery-next">▶</button>
        <span id="gallery-counter" class="hidden"></span>
        <div id="monitor-placeholder">NO SIGNAL</div>
        <div id="monitor-scanlines"></div>
      </div>
      <div id="monitor-infobar">
        <div>
          <div id="monitor-title"></div>
          <div id="monitor-meta"></div>
        </div>
        <a id="monitor-link" href="#" target="_blank" rel="noopener">▶ OPEN LINK</a>
      </div>
    </div>
  </div>

  <!-- ── STATUS BAR ── -->
  <div id="statusbar">
    <a class="sb-vcr-btn" href="index.html">○ HOME</a>
    <a class="sb-vcr-btn" href="about.html">◄◄ ABOUT</a>
    <a class="sb-vcr-btn" href="contact.html">CONTACT □</a>
  </div>

  <script>
  (() => {
    'use strict';

    /* ── Project data ─────────────────────────────────────────────────────── */
    const PROJECTS = {

    /* Category accent map */
    const ACCENTS = {
      documentary: 'var(--doc)',
      podcast:     'var(--pod)',
      brand:       'var(--brand)',
      film:        'var(--film)',
      photography: 'var(--photo)'
    };

    /* ── Build clips ──────────────────────────────────────────────────────── */
    let totalClips = 0;

    Object.entries(PROJECTS).forEach(([cat, projects]) => {
      const body  = document.getElementById('body-' + cat);
      const count = document.getElementById('count-' + cat);
      totalClips += projects.length;
      count.textContent = projects.length + ' CLIP' + (projects.length !== 1 ? 'S' : '');

      projects.forEach(p => {
        const clip = document.createElement('div');
        clip.className = 'clip';
        clip.dataset.cat   = cat;
        clip.dataset.title = p.title;
        clip.dataset.year  = p.year;
        clip.dataset.fmt   = p.format;
        clip.dataset.desc  = p.desc;
        clip.dataset.link    = p.link || '';
        clip.dataset.img     = p.img  || '';
        clip.dataset.gallery0 = (p.gallery && p.gallery[0]) || '';
        clip.dataset.accent  = ACCENTS[cat];

        clip.innerHTML =
          '<div class="clip-inner">' +
          '<div class="clip-title">' + p.title.toUpperCase() + '</div>' +
          '<div class="clip-format">' + p.year + ' · ' + p.format.split('·')[0].trim() + '</div>' +
          '</div>';

        clip.addEventListener('click', () => openMonitor(p, cat));
        body.appendChild(clip);
      });
    });

    // clip-count removed from statusbar

    /* ── Preview card ─────────────────────────────────────────────────────── */
    const card    = document.getElementById('preview-card');
    const pvPoster = document.getElementById('pv-poster');
    const pvTitle  = document.getElementById('pv-title');
    const pvMeta   = document.getElementById('pv-meta');
    const pvDesc   = document.getElementById('pv-desc');
    let hideTimer = null;

    document.querySelectorAll('.clip').forEach(clip => {
      clip.addEventListener('mouseenter', function (e) {
        clearTimeout(hideTimer);
        pvTitle.textContent = clip.dataset.title;
        pvMeta.textContent  = clip.dataset.year + ' · ' + clip.dataset.fmt;
        pvDesc.textContent  = clip.dataset.desc;
        card.style.setProperty('--preview-accent', clip.dataset.accent);

        // Show poster if available (gallery first image or single img)
        const imgSrc = clip.dataset.gallery0 || clip.dataset.img || '';
        if (imgSrc) {
          pvPoster.src = imgSrc;
          pvPoster.classList.remove('hidden');
        } else {
          pvPoster.classList.add('hidden');
        }

        positionCard(e);
        card.classList.add('visible');
      });

      clip.addEventListener('mousemove', positionCard);

      clip.addEventListener('mouseleave', () => {
        hideTimer = setTimeout(() => card.classList.remove('visible'), 80);
      });
    });

    function positionCard(e) {
      const PAD = 14;
      const CW = card.offsetWidth  || 240;
      const CH = card.offsetHeight || 120;
      let x = e.clientX + PAD;
      let y = e.clientY - CH - PAD;
      if (x + CW > window.innerWidth  - PAD) x = e.clientX - CW - PAD;
      if (y < PAD) y = e.clientY + PAD;
      card.style.left = x + 'px';
      card.style.top  = y + 'px';
    }

    /* ── Monitor modal ────────────────────────────────────────────────────── */
    const modal          = document.getElementById('monitor-modal');
    const monInner       = document.getElementById('monitor-inner');
    const monTitle       = document.getElementById('monitor-title');
    const monMeta        = document.getElementById('monitor-meta');
    const monLink        = document.getElementById('monitor-link');
    const monClose       = document.getElementById('monitor-close');
    const monPlaceholder = document.getElementById('monitor-placeholder');
    const galleryPrev    = document.getElementById('gallery-prev');
    const galleryNext    = document.getElementById('gallery-next');
    const galleryCounter = document.getElementById('gallery-counter');

    let galleryImages = [];
    let galleryIdx    = 0;

    function getYTId(url) {
      const m = url && url.match(/(?:youtu\.be\/|v=|\/embed\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }
    function getVimeoId(url) {
      const m = url && url.match(/vimeo\.com\/(\d+)/);
      return m ? m[1] : null;
    }
    function getInstaEmbed(url) {
      // Converts instagram.com/p/CODE/ or /reel/CODE/ → embed URL
      const m = url && url.match(/instagram\.com\/(p|reel|tv)\/([\w-]+)/);
      return m ? 'https://www.instagram.com/' + m[1] + '/' + m[2] + '/embed/' : null;
    }
    function isXLink(url) {
      return url && (url.includes('x.com') || url.includes('twitter.com'));
    }

    function showGalleryImage(idx) {
      monInner.querySelectorAll('img').forEach(el => el.remove());
      monPlaceholder.style.display = 'none';
      const el = document.createElement('img');
      el.src = galleryImages[idx];
      el.style.maxWidth = '100%';
      el.style.maxHeight = '72vh';
      el.style.objectFit = 'contain';
      monInner.insertBefore(el, galleryPrev);

      galleryCounter.textContent = (idx + 1) + ' / ' + galleryImages.length;
      galleryPrev.classList.toggle('hidden', idx === 0);
      galleryNext.classList.toggle('hidden', idx === galleryImages.length - 1);
    }

    function openMonitor(p) {
      // Clear previous
      monInner.querySelectorAll('img, iframe').forEach(el => el.remove());
      monPlaceholder.textContent = 'NO SIGNAL';
      monPlaceholder.style.display = '';
      galleryImages = [];
      galleryIdx = 0;
      galleryCounter.classList.add('hidden');
      galleryPrev.classList.add('hidden');
      galleryNext.classList.add('hidden');

      monTitle.textContent = p.title.toUpperCase();
      monMeta.textContent  = p.year + '  ·  ' + p.format;

      if (p.link) {
        monLink.href = p.link;
        monLink.classList.remove('hidden');
      } else {
        monLink.classList.add('hidden');
      }

      // Priority: gallery → single img → YouTube → Vimeo → Instagram → generic iframe → X fallback
      const makeIframe = (src, extraAllow) => {
        monPlaceholder.style.display = 'none';
        const el = document.createElement('iframe');
        el.src = src;
        el.allow = 'autoplay; fullscreen' + (extraAllow ? '; ' + extraAllow : '');
        el.allowFullscreen = true;
        el.style.width = '100%';
        el.style.height = '100%';
        el.style.minHeight = '480px';
        el.style.border = 'none';
        monInner.insertBefore(el, galleryPrev);
      };

      if (p.gallery && p.gallery.length > 0) {
        galleryImages = p.gallery;
        galleryCounter.classList.remove('hidden');
        showGalleryImage(0);
      } else if (p.img) {
        monPlaceholder.style.display = 'none';
        const el = document.createElement('img');
        el.src = p.img;
        el.style.maxWidth = '100%';
        el.style.maxHeight = '72vh';
        el.style.objectFit = 'contain';
        monInner.insertBefore(el, galleryPrev);
      } else if (getYTId(p.link)) {
        makeIframe('https://www.youtube.com/embed/' + getYTId(p.link) + '?autoplay=1&rel=0');
      } else if (getVimeoId(p.link)) {
        makeIframe('https://player.vimeo.com/video/' + getVimeoId(p.link) + '?autoplay=1');
      } else if (getInstaEmbed(p.link)) {
        makeIframe(getInstaEmbed(p.link));
      } else if (p.link && !isXLink(p.link)) {
        // Generic external link — try iframe embed (Brand Innovators, etc.)
        makeIframe(p.link);
      } else {
        // X/Twitter and no-link items — can't embed, prompt user
        monPlaceholder.textContent = '▶  CLICK "OPEN LINK" TO VIEW';
        monPlaceholder.style.display = '';
      }

      modal.classList.add('open');
    }

    galleryPrev.addEventListener('click', function(e) {
      e.stopPropagation();
      if (galleryIdx > 0) { galleryIdx--; showGalleryImage(galleryIdx); }
    });
    galleryNext.addEventListener('click', function(e) {
      e.stopPropagation();
      if (galleryIdx < galleryImages.length - 1) { galleryIdx++; showGalleryImage(galleryIdx); }
    });

    function closeMonitor() {
      modal.classList.remove('open');
      monInner.querySelectorAll('iframe').forEach(el => el.remove());
    }

    monClose.addEventListener('click', closeMonitor);
    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeMonitor();
    });
    document.addEventListener('keydown', function(e) {
      if (!modal.classList.contains('open')) return;
      if (e.key === 'Escape') { closeMonitor(); }
      else if (e.key === 'ArrowLeft'  && galleryImages.length) { galleryPrev.click(); }
      else if (e.key === 'ArrowRight' && galleryImages.length) { galleryNext.click(); }
    });

    /* ── Filter buttons ───────────────────────────────────────────────────── */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        document.querySelectorAll('.track').forEach(track => {
          if (f === 'all' || track.dataset.cat === f) {
            track.classList.remove('hidden');
          } else {
            track.classList.add('hidden');
          }
        });
      });
    });

  })();
  </script>

  <script src="film-transition.js"></script>
</body>
</html>
